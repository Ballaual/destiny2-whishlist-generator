name: Update Destiny 2 Manifest

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run manifest update script
        run: node scripts/update-manifest.mjs --force

      - name: Check for changes
        id: changes
        run: |
          git status
          git add public/manifest/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No manifest changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Manifest changes detected!"
            git status --short
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update destiny 2 manifest [automated]"
          git push
